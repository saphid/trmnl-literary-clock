name: Test recipe

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m unittest -v test_recipe_package.py
      - run: ./build-recipe-package.sh
      - run: unzip -t dist/LITERARY_CLOCK_TRMNL_RECIPE.zip
      - uses: actions/upload-artifact@v7
        with:
          name: literary-clock-trmnl-recipe
          path: dist/LITERARY_CLOCK_TRMNL_RECIPE.zip
